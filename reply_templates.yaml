# BiliComments 回复模板库
# 每个 intent 对应 3-5 条日语回复候选
# 语气统一：日本 Vocaloid P 主对粉丝的礼貌 + 亲切风格

# ============================================================
# intents: 意图分类 → 触发关键词
# 顺序 = 优先级（前面的意图匹配上就用前面的）
# ============================================================
intents:
  # 强烈好评（"神曲""爱了""循环了"等）
  强烈好评:
    keywords: ["神曲", "神了", "太神", "YYDS", "yyds", "爱了爱了", "爱住", "神仙曲", "循环了", "单曲循环", "太上头", "上头了", "顶", "太顶", "绝了", "太绝", "永远滴神", "永远的神", "破防", "破大防", "赛高", "666"]
    templates:
      - "聴いてくれて本当にありがとうございます！嬉しいです✨"
      - "反応いただき本当に嬉しいです、これからも頑張ります🎵"
      - "こんなに気に入っていただけて、制作した甲斐がありました🙌"

  # 情感深度评论（长评论 + 情感词）
  情感深度:
    keywords: ["感动", "感動", "眼泪", "泪目", "哭了", "共鸣", "共感", "戳心", "刺进心里", "触动", "被治愈", "疗愈"]
    templates:
      - "詳しい感想を書いてくれて本当に嬉しいです、次回作の励みになります"
      - "こんなに深く聴いてくれるファンの方がいて幸せです、ありがとう"
      - "感情が伝わって嬉しいです、これからも心のこもった曲を作ります"

  # 求二创授权
  求二创授权:
    keywords: ["求授权", "求二创", "二创授权", "翻唱可以吗", "翻唱可否", "能翻唱吗", "能不能翻唱", "搬运授权", "能搬运吗", "可以翻唱", "可以搬运"]
    templates:
      - "二次創作OKですよ！クレジットに元曲リンクを載せてください🙌"
      - "二次創作は歓迎です。使う時に一言お知らせいただけると嬉しいです"
      - "自由に使ってください！素敵な作品ができたらぜひ見せてくださいね✨"

  # 求资源（mp3/kara/音源）
  求资源:
    keywords: ["求mp3", "求MP3", "求音源", "求下载", "求kara", "求Kara", "求KARA", "求原曲", "求instrumental", "求piapro"]
    templates:
      - "後日 Piapro でオフボーカルを公開予定です！お待ちください"
      - "音源公開については追ってTwitterでお知らせしますね"
      - "Karaoke版は準備中です、公開したらここでも告知します"

  # 求歌词/翻译
  求歌词:
    keywords: ["求歌词", "求歌詞", "求罗马音", "求ローマ字", "求翻译", "求翻譯", "歌词呢", "歌词在哪", "求lyric", "有歌词吗"]
    templates:
      - "歌詞は概要欄に載せています！翻訳版もそのうち公開予定です"
      - "後日 note で歌詞と翻訳を公開しますね"
      - "歌詞翻訳のお手伝いをしてくれる方がいたら大歓迎です！"

  # 求周边/专辑
  求周边:
    keywords: ["求周边", "求周邊", "有周边吗", "周边什么时候", "求专辑", "求アルバム", "求CD", "什么时候出", "有没有实体"]
    templates:
      - "グッズ関連の情報は今後告知いたします！お楽しみに"
      - "検討中です、続報をお待ちください🎁"
      - "実物化についてはこれから相談していきます、応援ありがとう"

  # 求联动/合作
  求合作:
    keywords: ["求联动", "求聯動", "求合作", "联动一下", "collab", "コラボ"]
    templates:
      - "コラボについては個別にご連絡いただけると嬉しいです"
      - "興味あります！詳細を DM/メールで送っていただけますか"

  # 询问信息
  询问信息:
    keywords: ["什么时候", "何時", "多久", "いつ", "会不会", "还会", "有没有", "下次是"]
    templates:
      - "詳細は追ってお知らせしますね！"
      - "情報は Twitter でこまめに更新しています、フォローお願いします🔔"
      - "近日中に発表予定です、少々お待ちください"

  # 负面/质疑（务必人工审核，别自动发！）
  负面质疑:
    keywords: ["抄袭", "抄襲", "侵权", "侵權", "版权", "版權", "盗用", "盜用", "剽窃", "偷了", "断章取义"]
    templates:
      - "⚠️ 负面评论，务必人工回复！以下仅供参考："
      - "ご指摘ありがとうございます。詳細を確認の上、後日回答いたします"
      - "コメントありがとうございます。事実関係を調査してから改めてお返事します"

  # 一般点赞（短评论如"好听""不错"）
  一般点赞:
    keywords: ["好听", "好聽", "不错", "不錯", "挺好", "还行", "喜欢", "好き", "いい", "nice", "赞", "太棒"]
    templates:
      - "ありがとうございます！"
      - "反応嬉しいです🙌"
      - "コメントありがとう！次の曲もよろしくね"

  # UP 主本人（不推荐生成回复，标记 skip）
  UP主本人:
    keywords: []  # 通过 is_up 字段判断，不用关键词
    templates:
      - "（UP 主本人无需自动回复）"

  # 默认（无匹配）
  其他:
    keywords: []
    templates:
      - "ありがとうございます！"
      - "コメントいただき嬉しいです"
      - "反応感謝します🙌"

# ============================================================
# rules: 特殊规则
# ============================================================
rules:
  # 长评论（>50 字）自动升级到"情感深度"意图
  long_comment_min_chars: 50

  # UP 主本人的评论跳过（不生成回复）
  skip_up_comments: true

  # 楼中楼默认跳过（因为不是主评论，回复价值低）
  skip_sub_replies: true
