# ============================================================
# vocaloid_hints: 给 Google Translate 的额外提示（不做直接替换）
# 通过在翻译前给上下文，让 Google 翻得更准
# 暂未实现，v2.1 可加
# ============================================================
vocaloid_hints:
  context_prefix: ""  # 翻译时会前置的短句（如"以下是Vocaloid粉丝评论："）


# ============================================================
# preserve: 保持原样不翻译的字符（如 emoji、日语汉字等）
# ============================================================
preserve_regex:
  - "[\\u3040-\\u309F\\u30A0-\\u30FF]+"  # 已是日语的部分保持不变
